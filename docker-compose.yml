

services:
  mysql:
    image: mysql:8.0
    container_name: test_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: test_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5
    container_name: test_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

  apache:
    image: httpd:2.4
    container_name: test_apache
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
    depends_on:
      - fastapi

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test_fastapi
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql+aiomysql://app_user:app_password@mysql:3306/test_db"
      ENVIRONMENT: "local"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
